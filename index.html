<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="barra-nome">
            <h3>Nome Marca</h3>

        </div>


        <nav class="navegacao">
            <div class="barra-pesquisa">
                <div class="logo">
                    <h1>LOGO</h1>
                </div>

                <div class="formulario-pesquisa">
                    <form action="">
                        <input type="text" name="pesquisa" class="pesquisa">
                        <input type="button" value="Pesquisar" class="btn-pesquisa">
                    </form>
                </div>

                <div class="usuario">
                    <h2>USUÁRIO</h2>
                    <h3>sacola compras</h3>
                </div>

            </div>

            <div class="categorias">
                <ul>
                    <a href="">
                        <li>Feminino</li>
                    </a>

                    <a href="">
                        <li>Masculino</li>
                    </a>

                    <a href="">
                        <li>Infantil</li>
                    </a>

                    <a href="">
                        <li>Calçados</li>
                    </a>
                    
                </ul>
            </div>
        </nav>

    </header>

    <main>
        <section class="destaque">

            <div class="mosaico">
                <div class="img-1 img-mosaico">
                    <div class="txt-mosaico">
                        <h2>Moda Social Feminina com <br>
                        até 70% de desconto</h2>
                    </div>
                </div>

                <div class="img-2 img-mosaico" >
                    <div class="txt-mosaico">
                        <h2>Ternos com 38% de desconto!</h2>
                    </div>
                </div>
            </div>

            <div class="mosaico">

                <div class="img-3 img-mosaico">
                    
                </div>

                <div class="img-mosaico">
                    <img src="https://placehold.jp/300x500.png" alt="">
                </div>

            </div>
        </section>
    </main>
    
</body>
</html>
